<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NITJAA — Admin Login</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">NITJAA</div>
    <h2 class="login-title">Admin Portal</h2>
    

    <div class="alert err" id="loginErr" style="display:none"></div>

    <div class="field">
      <label>Username</label>
      <input id="username" type="text" placeholder="Enter admin username" autocomplete="username" />
    </div>
    <div class="field" style="margin-top:14px">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <button class="btn-primary btn-block" id="loginBtn" onclick="doLogin()" style="margin-top:20px">
      <span class="btn-label">Login</span>
      <span class="btn-spin" style="display:none">⏳ Logging in…</span>
    </button>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
