<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard — NITJAA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <div class="header-brand">
        <div class="brand-info">
          <p class="brand-name">NIT Jalandhar Alumni Association</p>
          <p class="brand-sub">Executive Committee Election Management </p>
        </div>
      </div>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
  </header>

  <main class="main">
    <section class="card">
      <h2 class="card-title">Nominee Verification</h2>
      <p class="card-desc">Review payment UTR and Degree certificates before approval[cite: 66, 68].</p>
      <div id="nomineeList" class="form-grid">
        </div>
    </section>

    <section class="card" style="background: #f8f9fa; border-left: 4px solid #0056b3;">
      <h2 class="card-title">Restricted Results</h2>
      <p class="card-desc">Live vote tallies for President, GS, and Council Members[cite: 131, 141].</p>
      <div id="adminResultsView">
        </div>
    </section>
  </main>
</body>
</html>
