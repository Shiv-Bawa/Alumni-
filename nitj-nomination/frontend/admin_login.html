<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login — NITJAA Election</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
  <div class="hero" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <div class="card" style="max-width: 400px; width: 100%;">
      <div class="card-label">Election Cell</div>
      <h2 class="card-title">Admin Access</h2>
      <p class="card-desc">Authorized personnel only.</p>
      
      <form id="adminLoginForm">
        <div class="field-wrap">
          <label class="field-label">Admin Email</label>
          <input type="email" id="adminEmail" class="field-input" required>
        </div>
        <div class="field-wrap">
          <label class="field-label">Password</label>
          <input type="password" id="adminPass" class="field-input" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">
          <span class="btn-label">Login to Dashboard</span>
        </button>
      </form>
    </div>
  </div>
</body>
</html>
